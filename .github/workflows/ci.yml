name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy config.py for CI
        run: |
          echo 'API_KEY = "sk-ci-placeholder"' > config.py

      - name: Run Week06 Agent tests (offline)
        run: python week06/test_simple_agent.py

      - name: Run Week07 Agent tests (offline)
        run: python week07/test_simple_agent.py

      - name: Run Week05 structured output tests
        run: python week05/test_structured_output.py
        continue-on-error: true  # May require model service

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            python -m py_compile "$f" && echo "OK: $f"
          done
