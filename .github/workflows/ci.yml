name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            python -m py_compile "$f" && echo "OK: $f"
          done
